<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>hear there</title>
    </head>

    <body>
        <div id="app">
            <!--<div id="map"></div>-->
            <!-- <button id="project">Toggle projection</button> -->
            <div id="viz" class="cosmos">
                <button id="playpause" type="button">Play/Pause</button>
                <p class="read-the-docs">
                    An homage to
                    <a href="https://weatherfortheblind.org" target="_blank"
                        >weatherfortheblind.org</a
                    >
                    <br />
                    Made with
                    <!--<a href="https://maplibre.org" target="_blank">Maplibre</a>,-->
                    <a href="https://tonejs.github.io/" target="_blank"
                        >Tone.js</a
                    >
                    by <a href="https://github.com/vakila">Anjana</a> at the
                    <a href="https://recurse.com">Recurse Center</a>
                </p>
            </div>
            <div class="card" id="info">
                <div id="controls">
                    <div id="hear">
                        <h2>hear</h2>

                        <div id="hear-controls">
                            <div class="voice-control" id="air">
                                <div class="voice-header">
                                    <span class="voice-name">Air</span>
                                    <button
                                        class="voice-toggle"
                                        aria-label="Toggle Air voice"
                                        data-voice="air"
                                    >
                                        OFF
                                    </button>
                                </div>
                                <div class="voice-data">
                                    <div class="data-item" id="wind_speed_10m">
                                        <span class="data-label"
                                            >wind speed</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div class="data-item" id="wind_gusts_10m">
                                        <span class="data-label">wind gust</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div
                                        class="data-item"
                                        id="wind_direction_10m"
                                    >
                                        <span class="data-label">wind dir</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div
                                        class="data-item"
                                        id="surface_pressure"
                                    >
                                        <span class="data-label">pressure</span
                                        ><span class="data-value">--</span>
                                    </div>
                                </div>
                            </div>

                            <div class="voice-control" id="fire">
                                <div class="voice-header">
                                    <span class="voice-name">Fire</span>
                                    <button
                                        class="voice-toggle"
                                        aria-label="Toggle Fire voice"
                                        data-voice="fire"
                                    >
                                        OFF
                                    </button>
                                </div>
                                <div class="voice-data">
                                    <div class="data-item" id="time">
                                        <span class="data-label">time</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div class="data-item" id="is_day">
                                        <span class="data-label">is day</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div class="data-item" id="cloud_cover">
                                        <span class="data-label"
                                            >cloud cover</span
                                        ><span class="data-value">--</span>
                                    </div>
                                </div>
                            </div>
                            <div class="voice-control" id="earth">
                                <div class="voice-header">
                                    <span class="voice-name">Earth</span>
                                    <button
                                        class="voice-toggle"
                                        aria-label="Toggle Earth voice"
                                        data-voice="earth"
                                    >
                                        OFF
                                    </button>
                                </div>
                                <div class="voice-data">
                                    <div class="data-item" id="elevation">
                                        <span class="data-label">elevation</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div class="data-item" id="temperature_2m">
                                        <span class="data-label"
                                            >temperature</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div
                                        class="data-item"
                                        id="apparent_temperature"
                                    >
                                        <span class="data-label"
                                            >apparent temp</span
                                        ><span class="data-value">--</span>
                                    </div>
                                </div>
                            </div>
                            <div class="voice-control" id="water">
                                <div class="voice-header">
                                    <span class="voice-name">Water</span>
                                    <button
                                        class="voice-toggle"
                                        aria-label="Toggle Water voice"
                                        data-voice="water"
                                    >
                                        OFF
                                    </button>
                                </div>
                                <div class="voice-data">
                                    <div
                                        class="data-item"
                                        id="relative_humidity_2m"
                                    >
                                        <span class="data-label">humidity</span
                                        ><span class="data-value">--</span>
                                    </div>
                                    <div class="data-item" id="precipitation">
                                        <span class="data-label"
                                            >precipitation</span
                                        ><span class="data-value">--</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="there">
                        <h2>there</h2>
                        <div id="there-controls">
                            <label>
                                latitude
                                <input
                                    id="lat"
                                    type="number"
                                    value="52.52"
                                    min="-90"
                                    max="90"
                                    step="0.01"
                                />
                            </label>
                            <label>
                                longitude
                                <input
                                    id="lon"
                                    type="number"
                                    value="13.41"
                                    min="-180"
                                    max="180"
                                    step="0.01"
                                />
                            </label>
                            <label>
                                search
                                <input
                                    id="search"
                                    type="search"
                                    placeholder="Berlin"
                                />
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
