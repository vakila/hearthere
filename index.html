<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>hear there</title>
    </head>

    <body>
        <div id="app">
            <!--<div id="map"></div>-->
            <!-- <button id="project">Toggle projection</button> -->
            <div id="viz" class="cosmos">
                <button id="playpause" type="button">Play/Pause</button>
                <p class="read-the-docs">
                    An homage to
                    <a href="https://weatherfortheblind.org" target="_blank"
                        >weatherfortheblind.org</a
                    >
                    <br />
                    Made with
                    <!--<a href="https://maplibre.org" target="_blank">Maplibre</a>,-->
                    <a href="https://tonejs.github.io/" target="_blank"
                        >Tone.js</a
                    >
                    by <a href="https://github.com/vakila">Anjana</a> at the
                    <a href="https://recurse.com">Recurse Center</a>
                </p>
            </div>
            <div class="card" id="info">
                <div id="controls">
                    <div id="hear">
                        <h2>hear</h2>

                        <div id="hear-controls">
                            <div class="voice-control" id="earth">
                                <div id="elevation">elevation</div>
                                <div id="temperature_2m">temperature</div>
                                <div id="apparent_temperature">
                                    apparent temp
                                </div>
                            </div>
                            <div class="voice-control" id="air">
                                <div id="wind_speed_10m">wind speed</div>
                                <div id="wind_gusts_10m">wind gust</div>
                                <div id="wind_direction_10m">wind dir</div>
                                <div id="surface_pressure">pressure</div>
                            </div>
                            <div class="voice-control" id="water">
                                <div id="relative_humidity_2m">humidity</div>
                                <div id="precipitation">precipitation</div>
                            </div>
                            <div class="voice-control" id="fire">
                                <div id="time">time</div>
                                <div id="is_day">is day</div>
                                <div id="cloud_cover">cloud cover</div>
                            </div>
                        </div>
                    </div>
                    <div id="there">
                        <h2>there</h2>
                        <div id="there-controls">
                            <label>
                                latitude
                                <input
                                    id="lat"
                                    type="number"
                                    value="52.52"
                                    min="-90"
                                    max="90"
                                    step="0.01"
                                />
                            </label>
                            <label>
                                longitude
                                <input
                                    id="lon"
                                    type="number"
                                    value="13.41"
                                    min="-180"
                                    max="180"
                                    step="0.01"
                                />
                            </label>
                            <label>
                                search
                                <input
                                    id="search"
                                    type="search"
                                    placeholder="Berlin"
                                />
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
